name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install setuptools (needed by node-gyp)
        run: pip install setuptools

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential libx11-dev libxkbfile-dev

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Import macOS signing certificate
        if: matrix.platform == 'mac'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          echo "$CSC_LINK" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          rm /tmp/cert.p12

      - name: Package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: npm run package:${{ matrix.platform }}

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download DMG and compute SHA256
        id: sha
        run: |
          curl -sL "https://github.com/AadityaMishra1/Gilfoyle/releases/download/v${{ steps.version.outputs.version }}/Gilfoyle-${{ steps.version.outputs.version }}-universal.dmg" -o gilfoyle.dmg
          SHA=$(sha256sum gilfoyle.dmg | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew cask
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha256 }}"

          CASK_CONTENT=$(cat <<RUBY
          cask "gilfoyle" do
            version "${VERSION}"
            sha256 "${SHA}"

            url "https://github.com/AadityaMishra1/Gilfoyle/releases/download/v#{version}/Gilfoyle-#{version}-universal.dmg"
            name "Gilfoyle"
            desc "Desktop environment for Claude Code"
            homepage "https://github.com/AadityaMishra1/Gilfoyle"

            depends_on macos: ">= :catalina"

            app "Gilfoyle.app"

            zap trash: [
              "~/Library/Application Support/gilfoyle",
              "~/Library/Preferences/com.gilfoyle.app.plist",
              "~/Library/Caches/com.gilfoyle.app",
              "~/.gilfoyle",
            ]
          end
          RUBY
          )

          ENCODED=$(echo "$CASK_CONTENT" | base64 -w 0)
          FILE_SHA=$(gh api repos/AadityaMishra1/homebrew-gilfoyle/contents/Casks/gilfoyle.rb --jq '.sha')

          gh api repos/AadityaMishra1/homebrew-gilfoyle/contents/Casks/gilfoyle.rb \
            -X PUT \
            -f message="Update gilfoyle to v${VERSION}" \
            -f content="$ENCODED" \
            -f sha="$FILE_SHA"
